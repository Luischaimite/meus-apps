<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luís Dev | Super App</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --p: #00e676; --bg: #0f172a; --c: #1e293b; }
        * { margin:0; padding:0; box-sizing:border-box; font-family:sans-serif; }
        body { background: var(--bg); color: white; }
        .p-20 { padding: 20px; }
        header { text-align: center; padding: 30px 0; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; max-width: 500px; margin: auto; }
        .card { background: var(--c); padding: 20px; border-radius: 15px; text-align: center; cursor: pointer; border: 1px solid #334155; }
        .card span { font-size: 30px; display: block; margin-bottom: 5px; }
        
        /* TELAS DOS APPS */
        .app-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 100; display: none; flex-direction: column; padding: 20px; overflow-y: auto; }
        .back-btn { background: #334155; padding: 10px; border-radius: 8px; margin-bottom: 20px; text-align: center; cursor: pointer; color: var(--p); font-weight: bold; }
        
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; font-size: 16px; }
        .btn { background: var(--p); color: black; width: 100%; padding: 15px; border-radius: 8px; font-weight: bold; border: none; margin-top: 10px; }
        .res { background: var(--c); padding: 15px; margin-top: 15px; border-radius: 8px; text-align: center; border: 1px dashed var(--p); }

        /* BLOQUEIO PAYWALL */
        #paywall { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 9999; display: none; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 30px; }
        .btn-pay { background: var(--p); color: black; padding: 15px 30px; border-radius: 12px; text-decoration: none; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>

    <div id="home" class="p-20">
        <header>
            <h1>LUÍS<span style="color:var(--p)">DEV</span></h1>
            <p>Soluções Digitais em Marracuene</p>
        </header>
        <div class="grid">
            <div class="card" onclick="openApp('recibo')"><span>📄</span><p>Recibos</p></div>
            <div class="card" onclick="openApp('qr')"><span>📲</span><p>QR Code</p></div>
            <div class="card" onclick="openApp('lucro')"><span>💰</span><p>Lucro</p></div>
            <div class="card" onclick="openApp('saude')"><span>🏥</span><p>Saúde</p></div>
            <div class="card" onclick="openApp('tarefas')"><span>✅</span><p>Tarefas</p></div>
            <div class="card" onclick="openApp('cardapio')"><span>🍔</span><p>Cardápio</p></div>
        </div>
    </div>

    <div id="app-screen" class="app-screen">
        <div class="back-btn" onclick="closeApp()">← VOLTAR</div>
        <div id="app-body"></div>
    </div>

    <div id="paywall">
        <h1 style="font-size: 50px;">🔐</h1>
        <h2 style="color: var(--p);">Tempo Expirado!</h2>
        <p style="margin-top: 10px;">Para continuar a usar este app no seu negócio, faça o pagamento via M-Pesa.</p>
        <a href="https://wa.me/258872343542?text=Olá%20Luís!%20Quero%20pagar%20pelo%20acesso%20total." class="btn-pay">PAGAR VIA M-PESA</a>
    </div>

    <script>
        let timer;
        const appScreen = document.getElementById('app-screen');
        const appBody = document.getElementById('app-body');

        function openApp(tipo) {
            appScreen.style.display = 'flex';
            
            // Inicia cronómetro de 1 minuto
            clearTimeout(timer);
            timer = setTimeout(() => {
                document.getElementById('paywall').style.display = 'flex';
            }, 60000);

            // Carrega o conteúdo do App
            if(tipo === 'qr') {
                appBody.innerHTML = `<h2>Gerador de QR Code</h2><input id="qrin" placeholder="Número M-Pesa" oninput="genQR(this.value)"><div id="qrout" class="res" style="background:white; padding:10px; min-height:150px;"></div>`;
            } else if(tipo === 'lucro') {
                appBody.innerHTML = `<h2>Calculadora de Lucro</h2><input type="number" id="c" placeholder="Custo"><input type="number" id="v" placeholder="Venda"><button class="btn" onclick="calcL()">Calcular</button><div class="res" id="r">0.00 MT</div>`;
            } else if(tipo === 'saude') {
                appBody.innerHTML = `<h2>Saúde IMC</h2><input type="number" id="p" placeholder="Peso (kg)"><input type="number" id="a" placeholder="Altura (ex: 1.70)"><button class="btn" onclick="calcS()">Verificar</button><div class="res" id="rs">Seu IMC aparecerá aqui</div>`;
            } else {
                appBody.innerHTML = `<h2>App em Manutenção</h2><p>O Luís está a atualizar este app para si!</p>`;
            }
        }

        function closeApp() { appScreen.style.display = 'none'; clearTimeout(timer); }

        // Funções dos Apps
        function genQR(val) { document.getElementById('qrout').innerHTML = ""; new QRCode(document.getElementById('qrout'), {text: val, width: 150, height: 150}); }
        function calcL() { const res = document.getElementById('v').value - document.getElementById('c').value; document.getElementById('r').innerText = res.toFixed(2) + " MT"; }
        function calcS() { const p = document.getElementById('p').value; const a = document.getElementById('a').value; const imc = (p / (a * a)).toFixed(1); document.getElementById('rs').innerText = "IMC: " + imc; }
    </script>
</body>
</html>
