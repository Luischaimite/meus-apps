<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luís Dev | Premium Apps e-Mola</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --p: #eab308; --emola: #ff6600; --bg: #0a0a0a; --c: #171717; }
        * { margin:0; padding:0; box-sizing:border-box; font-family:sans-serif; }
        body { background: var(--bg); color: white; overflow-x: hidden; }
        .p-20 { padding: 20px; }
        header { text-align: center; padding: 40px 0; border-bottom: 1px solid #262626; margin-bottom: 20px; }
        header h1 { font-size: 28px; color: var(--p); letter-spacing: 3px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; max-width: 500px; margin: auto; }
        .card { background: var(--c); padding: 20px; border-radius: 15px; text-align: center; cursor: pointer; border: 1px solid #262626; transition: 0.3s; }
        .card span { font-size: 30px; display: block; margin-bottom: 8px; }
        .card p { font-size: 11px; font-weight: bold; text-transform: uppercase; color: #a3a3a3; }
        
        .app-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 100; display: none; flex-direction: column; padding: 25px; overflow-y: auto; }
        .back-btn { background: var(--c); padding: 12px; border-radius: 10px; margin-bottom: 20px; text-align: center; cursor: pointer; color: var(--p); font-weight: bold; border: 1px solid var(--p); }
        
        #tut { background: var(--p); color: black; padding: 12px; border-radius: 8px; margin-bottom: 20px; text-align: center; font-size: 13px; font-weight: bold; }

        input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px; border: 1px solid #404040; font-size: 16px; background: #171717; color: white; }
        .btn { background: var(--p); color: black; width: 100%; padding: 16px; border-radius: 10px; font-weight: bold; border: none; margin-top: 10px; }
        .res { background: #171717; padding: 20px; margin-top: 20px; border-radius: 12px; text-align: center; border: 1px dashed var(--p); }

        /* BLOQUEIO E-MOLA */
        #paywall { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 9999; display: none; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 30px; }
        .btn-pay { background: var(--emola); color: white; padding: 18px 40px; border-radius: 12px; text-decoration: none; font-weight: bold; margin-top: 25px; box-shadow: 0 0 20px rgba(255, 102, 0, 0.4); }
    </style>
</head>
<body>

    <div id="home" class="p-20">
        <header><h1>LUÍS<span style="color:white">DEV</span></h1><p style="color: #737373;">SOLUÇÕES e-Mola PREMIUM</p></header>
        <div class="grid">
            <div class="card" onclick="openApp('recibo')"><span>📄</span><p>Recibos</p></div>
            <div class="card" onclick="openApp('qr')"><span>📲</span><p>QR e-Mola</p></div>
            <div class="card" onclick="openApp('lucro')"><span>💰</span><p>Lucro</p></div>
            <div class="card" onclick="openApp('saude')"><span>🏥</span><p>Saúde</p></div>
            <div class="card" onclick="openApp('tarefas')"><span>✅</span><p>Tarefas</p></div>
            <div class="card" onclick="openApp('cardapio')"><span>🍔</span><p>Cardápio</p></div>
            <div class="card" onclick="openApp('bilhete')"><span>🎟️</span><p>Bilhetes</p></div>
            <div class="card" onclick="openApp('rands')"><span>🇿🇦</span><p>Rands/MT</p></div>
        </div>
    </div>

    <div id="app-screen" class="app-screen">
        <div class="back-btn" onclick="closeApp()">← VOLTAR</div>
        <div id="tut">A carregar tutorial...</div>
        <div id="app-body"></div>
    </div>

    <div id="paywall">
        <h1 style="font-size: 70px;">🧡</h1>
        <h2 style="color: white;">Versão Grátis Expirada</h2>
        <p style="color: #a3a3a3; margin-top: 10px;">Ative o acesso ilimitado fazendo o pagamento via <b>e-Mola</b>.</p>
        <a href="https://wa.me/258872343542?text=Olá%20Luís!%20Quero%20ativar%20os%20Apps%20via%20e-Mola." class="btn-pay">PAGAR VIA e-MOLA</a>
    </div>

    <script>
        let timer;
        const appScreen = document.getElementById('app-screen');
        const appBody = document.getElementById('app-body');
        const tut = document.getElementById('tut');

        function openApp(tipo) {
            appScreen.style.display = 'flex';
            tut.style.display = 'block';
            clearTimeout(timer);
            timer = setTimeout(() => { document.getElementById('paywall').style.display = 'flex'; }, 60000);

            if(tipo === 'rands') {
                tut.innerText = "TUTORIAL: Converta Rands para Meticais usando a cotação do dia.";
                appBody.innerHTML = `<h2>Rands ↔ Meticais</h2><input type="number" id="ra" placeholder="Valor em Rands"><input type="number" id="cot" placeholder="Cotação"><button class="btn" onclick="convR()">Converter</button><div class="res" id="r-conv">0.00 MT</div>`;
            }
            else if(tipo === 'qr') {
                tut.innerText = "TUTORIAL: Gere o seu QR Code para receber via e-Mola.";
                appBody.innerHTML = `<h2>QR Code e-Mola</h2><input id="qrin" placeholder="Número Movitel" oninput="genQR(this.value)"><div id="qrout" class="res" style="background:white; padding:10px; display:flex; justify-content:center;"></div>`;
            }
            // ... (restante das funções de cada app)
            else if(tipo === 'bilhete') {
                tut.innerText = "TUTORIAL: Gere bilhetes com série única.";
                appBody.innerHTML = `<h2>Bilhetes VIP</h2><input id="ev" placeholder="Evento"><input type="number" id="pre" placeholder="Preço"><button class="btn" onclick="genTicket()">Gerar</button><div id="t-out" class="res" style="display:none; background:#fef08a; color:black;"></div>`;
            }
            else {
                tut.innerText = "TUTORIAL: Preencha os campos para usar a ferramenta.";
                appBody.innerHTML = `<h2>Ferramenta</h2><p>Clique em voltar e escolha outra opção.</p>`;
            }

            setTimeout(() => { tut.style.display = 'none'; }, 10000);
        }

        function closeApp() { appScreen.style.display = 'none'; clearTimeout(timer); }
        function convR() { const r = document.getElementById('ra').value; const c = document.getElementById('cot').value; document.getElementById('r-conv').innerText = (r * c).toFixed(2) + " MT"; }
        function genQR(v) { document.getElementById('qrout').innerHTML = ""; new QRCode(document.getElementById('qrout'), {text: v, width: 140, height: 140}); }
        function genTicket() { const ev = document.getElementById('ev').value; const out = document.getElementById('t-out'); out.style.display = 'block'; out.innerHTML = `<b>ADMISSÃO VIP</b><br><h3>${ev.toUpperCase()}</h3><p>SÉRIE: #LDEV-${Math.floor(Math.random()*99999)}</p>`; }
    </script>
</body>
</html>
